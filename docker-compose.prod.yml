services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-prod

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis-prod
    volumes:
      - redisdata_prod:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: portfolio/backend:latest
    container_name: portfolio-backend-prod
    expose:
      - "3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      ANALYTICS_SALT: ${ANALYTICS_SALT:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: portfolio/frontend:latest
    container_name: portfolio-frontend-prod
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - portfolio-prod

volumes:
  pgdata_prod:
  redisdata_prod:

networks:
  portfolio-prod:
    driver: bridge
