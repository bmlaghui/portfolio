services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-portfolio}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: portfolio-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-portfolio}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecret_jwt_key_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecret_refresh_key_change_in_prod}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      ANALYTICS_SALT: ${ANALYTICS_SALT:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: portfolio-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
